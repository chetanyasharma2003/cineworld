name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Server lint + test ────────────────────────────────────────────────────────
  server:
    name: Server — Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Check for lint errors (if eslint configured)
        run: npx eslint . --ext .js --ignore-pattern node_modules --max-warnings 0 || true

  # ── Client lint + build ──────────────────────────────────────────────────────
  client:
    name: Client — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:8000/api' }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 3

  # ── Security audit ────────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit server dependencies
        run: cd server && npm audit --audit-level=high || true

      - name: Audit client dependencies
        run: cd client && npm audit --audit-level=high || true

  # ── Docker build + push (only on main) ────────────────────────────────────────
  docker:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [server, client]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cineworld-api:latest
            ${{ secrets.DOCKER_USERNAME }}/cineworld-api:${{ github.sha }}

      - name: Build & push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cineworld-web:latest
            ${{ secrets.DOCKER_USERNAME }}/cineworld-web:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
